name: meanflow
trainer: meanflow  # trainer registry key

train:
  train_batch_size: 2048
  grad_accu_step: 1
  shuffle: true
  drop_last: true
  epochs: 2
  learning_rate: 2.8e-4
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.0
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  ema_decay: 0.9
  checkpointing_steps: 100
  resume_step: 0  # >0 resumes from checkpoints/{resume_step:07d}.pt

loss:
  path_type: linear  # interpolant: "linear" or "cosine"
  weighting: adaptive  # loss weighting: "uniform" or "adaptive"
  time_sampler: logit_normal  # time sampling: "uniform" or "logit_normal"
  time_mu: -0.4  # logit_normal mean
  time_sigma: 1.0  # logit_normal std
  ratio_r_not_equal_t: 0.25  # fraction of samples with r != t
  adaptive_p: 1.0  # power for adaptive weighting
  cfg_omega: 0.2  # CFG omega (1.0 = no CFG)
  cfg_kappa: 0.92  # CFG kappa (cond/uncond mix)
  cfg_min_t: 0.0  # min time to trigger CFG
  cfg_max_t: 0.8  # max time to trigger CFG
