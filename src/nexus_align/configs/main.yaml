# Top-level config loaded by cli/main.py (config_name="main").

defaults:
  - model: sit
  - data: imagenet_1k
  - algorithm: meanflow
  - override hydra/job_logging: none  # logging is configured by init_log instead
  - _self_

exp_mode: train  # "train" or "eval"

common:
  seed: 42
  debug: false
  deterministic: true

log:
  exp_info: default
  timestamp: true
  log_dir: logs
  wandb:
    entity: null
    project: nexus_align
    name: null
    wandb_offline: true

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false
