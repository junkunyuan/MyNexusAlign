# Top-level config loaded by cli/main.py (config_name="main").

defaults:
  - model: sit
  - _self_

exp_mode: train  # "train" or "eval"

common:
  seed: 42
  debug: true
  debug_console: true
  deterministic: true
  time_cost_analysis: false

log:
  exp_info: default
  log_dir: logs
  wandb:
    entity: null
    project: nexus_align
    name: null
    wandb_offline: true

hydra:
  run:
    dir: ${log.log_dir}/${log.exp_info}
  job:
    chdir: true
