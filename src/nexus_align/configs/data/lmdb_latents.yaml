# LMDB latents dataset config (selected by name from the dataset registry).

name: lmdb_latents
lmdb_path: /opt/tiger/MeanFlow/data_and_model/imagenet_train_latents.lmdb     # path to the LMDB latents dataset
flip_prob: 0.5     # probability of returning horizontally-flipped moments
num_workers: 4
sample_ratio: 1.0  # fraction of the dataset to use (1.0 = all)
drop_last: true    # drop the last incomplete batch
cache_dir: null    # optional local cache directory
